name: Bug Report
description: Report a bug in PassesBox
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Tap '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - macOS
        - Web
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g., Android 14, iOS 17.2, macOS 15.3"
    validations:
      required: true
  - type: input
    id: flutter-version
    attributes:
      label: Flutter Version
      description: Output of `flutter --version`
      placeholder: "e.g., 3.29.3"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Any relevant error output or stack traces.
      render: shell
    validations:
      required: false
