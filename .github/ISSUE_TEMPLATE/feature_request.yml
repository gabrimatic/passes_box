name: Feature Request
description: Suggest a new feature for PassesBox
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered.
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) would this affect?
      multiple: true
      options:
        - Android
        - iOS
        - macOS
        - Web
        - All
    validations:
      required: true
