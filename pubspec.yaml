name: passes_box
description: Offline password manager with AES-256 encryption, biometric auth, and encrypted backup. Android, iOS, macOS, and Web.
homepage: https://github.com/gabrimatic/passes_box

version: 2.1.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  get: ^4.7.3
  shared_preferences: ^2.5.0
  file_saver: ^0.3.0
  file_selector: ^1.1.0
  permission_handler: ^12.0.0
  cryptography: ^2.9.0
  url_launcher: ^6.3.0
  local_auth: ^3.0.0
  sembast: ^3.7.0
  sembast_web: ^2.3.0
  path_provider: ^2.1.0
  otp_auth: ^1.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  crypto: ^3.0.3
  csv: ^7.2.0
  http: ^1.3.0

dev_dependencies:
  flutter_lints: ^6.0.0

dependency_overrides:
  win32: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: raleway
      fonts:
        - asset: assets/fonts/raleway.ttf
